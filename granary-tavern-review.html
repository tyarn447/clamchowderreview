<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Granary Tavern - Clam Chowder Reviews</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="top-nav">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">Clam Chowder Reviews</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
            </ul>
        </div>
    </nav>

    <header class="post-header">
        <div class="container">
            <div class="header-layout">
                <img src="mascot.png" alt="Clam Chowder Mascot" class="mascot-small">
                <div class="header-text">
                    <h1>Granary Tavern</h1>
                    <p class="post-date" style="color: var(--light-blue); font-size: 0.9rem; margin-top: 8px;">Boston, MA</p>
                    <p class="post-summary">Under construction — the bacon situation needs to be addressed.</p>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <article class="review-post">
            <div class="review-body">
                <p>Under construction</p>
            </div>

            <div style="clear: both;"></div>

            <div class="review-map">
                <h2>Location</h2>
                <iframe
                    src="https://maps.google.com/maps?q=Granary+Tavern,+170+Milk+Street,+Boston,+MA+02109&output=embed"
                    width="100%"
                    height="400"
                    style="border:0;"
                    allowfullscreen=""
                    loading="lazy">
                </iframe>
            </div>
        </article>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Clam Chowder Reviews. May your bowl always be full mollusk friends.</p>
        </div>
    </footer>
</body>
